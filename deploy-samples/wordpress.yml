name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Create env file
        run: |
          mkdir -p mu-plugins/app
          cat > mu-plugins/app/.env.php << 'EOF'
          <?php

          return [
              'ACF_LITE' => true,
              'FILE_MOD_ALLOWED' => false,
          ];
          EOF

      - name: Install Composer dependencies
        run: composer install -o --prefer-dist --no-progress --no-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install
        working-directory: themes/${{ vars.THEME_NAME }}

      - name: Build assets
        run: npm run build
        working-directory: themes/${{ vars.THEME_NAME }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ vars.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Create rsync excludes file
        run: |
          cat > .rsync-excludes << 'EOF'
          .htaccess
          /.git*
          /.git/
          /advanced-cache.php
          /auth.json
          /backdrop/
          /banners/
          /cache/
          /composer.json
          /composer.lock
          /ew_backup/
          /mysql.sql
          /object-cache.php
          /README.md
          /tests/
          /upgrade/
          /uploads/
          /w3tc-config/
          /wflogs/
          /wp-cache-config.php
          /wp-content/
          /wp-rocket-config/
          /drop-ins/
          /debug.log
          phpunit.xml
          .travis.yml
          rsync-excludes.txt
          .excludes
          node_modules/
          /mu-plugins/app/data/
          /mu-plugins/force-strong-passwords/
          /mu-plugins/kinsta-mu-plugins/
          /mu-plugins/limit-login-attempts
          /mu-plugins/liquid-web/
          /mu-plugins/nexcess-mapps
          /mu-plugins/plugin-reports/
          /mu-plugins/wp-cli-packages
          /mu-plugins/wp-redis
          /mu-plugins/wpe-cache-plugin/
          /mu-plugins/wpe-elasticpress-autosuggest-logger/
          /mu-plugins/wpe-update-source-selector/
          /mu-plugins/wpe-wp-sign-on-plugin/
          /mu-plugins/wpengine-common/
          /mu-plugins/000-liquidweb-config.php
          /mu-plugins/jetpack.php
          /mu-plugins/kinsta-mu-plugins.php
          /mu-plugins/liquid-web.php
          /mu-plugins/liquidweb_mwp.php
          /mu-plugins/lw-varnish-cache-purger.php
          /mu-plugins/lw_disable_nags.php
          /mu-plugins/mu-plugin.php
          /mu-plugins/nexcess-mapps.php
          /mu-plugins/slt-force-strong-passwords.php
          /mu-plugins/wp-fail2ban.php
          /mu-plugins/wp-vulnerability-scanner.php
          /mu-plugins/wpe-elasticpress-autosuggest-logger.php
          /mu-plugins/wpe-wp-sign-on-plugin.php
          /mu-plugins/wpengine-security-auditor.php
          /plugins/genesis-blocks/
          /plugins/nexcess-mapps-dashboard/
          /plugins/cache-enabler/
          /plugins/wp-redis/
          /plugins/redis-cache/
          EOF

      - name: Deploy to server
        run: |
          rsync -rlvz --delete --checksum \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            --exclude-from='.rsync-excludes' \
            --info=progress2 \
            . ${{ vars.DEPLOY_USER }}@${{ vars.DEPLOY_HOST }}:/home/wpe-user/sites/${{ vars.DEPLOY_USER }}/wp-content/

      - name: Purge WP Engine cache
        run: |
          curl -X POST \
            -u "${{ secrets.WPE_API_USER }}:${{ secrets.WPE_API_PASSWORD }}" \
            -H "Content-Type: application/json" \
            -d '{"type":"page"}' \
            https://api.wpengineapi.com/v1/installs/${{ vars.WPE_INSTALL_ID }}/purge_cache

      - name: Send Slack notification
        if: always()
        uses: slackapi/slack-github-action@v1.26.0
        continue-on-error: true
        with:
          payload: |
            {
              "text": "${{ job.status == 'success' && '✅' || '❌' }} Deploy ${{ job.status }} - ${{ github.repository }}\n${{ github.event.head_commit.message }}",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "${{ job.status == 'success' && '✅ Deployment Successful' || '❌ Deployment Failed' }}"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Repository:*\n${{ github.repository }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Branch:*\n${{ github.ref_name }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Commit:*\n${{ github.event.head_commit.message }}\n<${{ github.event.head_commit.url }}|View commit>"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Author:*\n${{ github.event.head_commit.author.name }}"
                    }
                  ]
                },
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View workflow run>"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
